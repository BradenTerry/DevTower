<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLEET // agent operations console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  /* ============ TOKENS ============ */
  :root,[data-theme="dark"]{
    /* elevation ladder — each step clearly lighter than the last */
    --bg:        #050708;   /* deepest: app shell */
    --panel:     #0f1518;   /* windows (sidebar, dock) */
    --panel-2:   #1c252b;   /* options / cards / controls */
    --panel-3:   #28333b;   /* selected / hover */
    /* borders, brightest = window dividers */
    --edge:      #475761;   /* major window separators */
    --line:      #313e46;   /* control / option outlines */
    --line-soft: #1d2730;   /* inner subtle rules */
    --text:      #eef3f5;
    --text-dim:  #a2adb1;
    --text-faint:#6f7a7f;

    --amber:     #ffb13d;
    --amber-deep:#c9821f;
    --on-amber:  #0a0c0d;
    --active:    #3ee089;
    --waiting:   #ffb13d;
    --complete:  #56c7ff;
    --error:     #ff6055;
    --idle:      #5b666b;

    --add:       #3ee089;
    --add-bg:    #0f261a;
    --del:       #ff6055;
    --del-bg:    #261413;

    --grid:      rgba(255,255,255,.022);
    --grain:     .03;
    --shadow:    0 14px 32px -14px rgba(0,0,0,.75);
  }

  [data-theme="light"]{
    --bg:        #d7d2c5;   /* darker warm shell so panels pop */
    --panel:     #e8e3d8;   /* windows */
    --panel-2:   #f6f3ec;   /* options / cards */
    --panel-3:   #ffffff;   /* selected / hover */
    --edge:      #ada592;   /* window separators (strong) */
    --line:      #c6bda8;
    --line-soft: #dbd4c4;
    --text:      #12171a;
    --text-dim:  #474e49;
    --text-faint:#7a8079;

    --amber:     #9c5f08;
    --amber-deep:#7a4a06;
    --on-amber:  #fffaf0;
    --active:    #0f7340;
    --waiting:   #9c5f08;
    --complete:  #0e5d8f;
    --error:     #b32d23;
    --idle:      #8d938b;

    --add:       #0f7340;
    --add-bg:    #d2ecd9;
    --del:       #b32d23;
    --del-bg:    #f6d8d3;

    --grid:      rgba(40,30,10,.04);
    --grain:     0;
    --shadow:    0 14px 30px -16px rgba(60,50,30,.4);
  }

  :root{
    --mono:  'IBM Plex Mono', ui-monospace, monospace;
    --label: 'Martian Mono', ui-monospace, monospace;
    --r: 4px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  ::selection{ background:rgba(255,177,61,.25); color:#fff; }

  html,body{ height:100%; }
  body{
    font-family:var(--mono);
    font-size:13px;
    line-height:1.5;
    color:var(--text);
    background:var(--bg);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* atmosphere: faint grid, masked to a corner so it reads as texture not noise */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size:38px 38px;
    mask-image:radial-gradient(ellipse 90% 70% at 22% -5%, #000 20%, transparent 75%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:var(--grain);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ LAYOUT SHELL ============ */
  .app{
    position:relative; z-index:1;
    height:100vh;
    display:grid;
    grid-template-rows:34px 1fr 22px;
  }
  .body{
    display:grid;
    grid-template-columns:300px 1fr;
    min-height:0;
  }

  /* ============ TITLEBAR ============ */
  .titlebar{
    display:flex; align-items:center; gap:14px;
    padding:0 12px;
    background:var(--panel);
    border-bottom:1px solid var(--edge);
  }
  .dots{ display:flex; gap:7px; }
  .dots i{ width:11px; height:11px; border-radius:50%; display:block; }
  .dots i:nth-child(1){ background:#ff6055; }
  .dots i:nth-child(2){ background:#ffb13d; }
  .dots i:nth-child(3){ background:#3ee089; }

  .brand{
    font-family:var(--label); font-weight:700; font-size:12px;
    letter-spacing:.32em; text-transform:uppercase;
    color:var(--text);
    display:flex; align-items:center; gap:9px;
  }
  .brand .spark{ color:var(--amber); font-size:14px; transform:translateY(.5px); }
  .brand small{
    font-family:var(--label); font-weight:400; font-size:8.5px;
    letter-spacing:.28em; color:var(--text-faint);
    border-left:1px solid var(--line); padding-left:9px; margin-left:2px;
  }

  .telemetry{ margin-left:auto; display:flex; align-items:center; gap:2px; }
  .tstat{
    display:flex; align-items:center; gap:7px;
    padding:0 13px; height:34px;
    border-left:1px solid var(--line-soft);
    font-family:var(--label); font-size:9px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--text-dim);
  }
  .tstat-num{ font-family:var(--mono); font-size:13px; font-weight:600; letter-spacing:0; color:var(--text); }
  .tstat .pip{ width:6px; height:6px; border-radius:50%; }
  .pip.active{ background:var(--active); box-shadow:0 0 7px var(--active); }
  .pip.waiting{ background:var(--waiting); box-shadow:0 0 7px var(--waiting); }
  .pip.error{ background:var(--error); box-shadow:0 0 7px var(--error); }
  .clock{ font-family:var(--mono); font-size:11px; color:var(--text-faint); padding:0 12px 0 13px; border-left:1px solid var(--line-soft); height:34px; display:flex; align-items:center; letter-spacing:.05em; }
  .themebtn{
    display:flex; align-items:center; gap:7px; height:34px; padding:0 13px; cursor:pointer;
    background:transparent; border:none; border-left:1px solid var(--line-soft);
    font-family:var(--label); font-size:9px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--text-dim); transition:color .15s, background .15s;
  }
  .themebtn:hover{ color:var(--text); background:var(--panel-2); }
  .themebtn .ti{ font-size:13px; color:var(--amber); }

  /* ============ SIDEBAR ============ */
  .sidebar{
    background:var(--panel);
    border-right:1px solid var(--edge);
    display:flex; flex-direction:column; min-height:0;
  }
  .side-head{
    padding:11px 13px 9px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line-soft);
  }
  .side-head h2{
    font-family:var(--label); font-weight:600; font-size:9.5px;
    letter-spacing:.26em; text-transform:uppercase; color:var(--text-dim);
  }
  .side-head .count{ font-size:10px; color:var(--text-faint); font-family:var(--mono); }

  /* project selector */
  .projsel{ position:relative; padding:9px 11px 5px; }
  .projsel-btn{
    width:100%; display:flex; align-items:center; gap:9px; cursor:pointer;
    background:var(--panel-2); border:1px solid var(--line); border-radius:var(--r);
    padding:8px 11px; color:var(--text); font-family:var(--mono); font-size:12px;
    transition:border-color .15s, background .15s;
  }
  .projsel-btn:hover{ border-color:var(--text-faint); }
  .projsel.open .projsel-btn{ border-color:var(--amber); background:var(--panel-3); }
  .projsel-btn .pl{ font-family:var(--label); font-size:8px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); }
  .projsel-btn .pv{ flex:1; text-align:left; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .projsel-btn .cv{ color:var(--text-dim); font-size:10px; transition:transform .18s; }
  .projsel.open .projsel-btn .cv{ transform:rotate(180deg); color:var(--amber); }

  .projsel-menu{
    position:absolute; left:11px; right:11px; top:calc(100% - 2px); z-index:50;
    background:var(--panel-2); border:1px solid var(--edge); border-radius:var(--r);
    box-shadow:var(--shadow); padding:4px; display:none;
    animation:drop .15s ease;
  }
  .projsel.open .projsel-menu{ display:block; }
  @keyframes drop{ from{ opacity:0; transform:translateY(-4px); } }
  .proj-opt{
    display:flex; align-items:center; gap:9px; padding:7px 9px; cursor:pointer;
    border-radius:3px; font-size:11.5px; color:var(--text-dim); transition:.12s;
  }
  .proj-opt:hover{ background:var(--panel-3); color:var(--text); }
  .proj-opt.on{ color:var(--text); }
  .proj-opt.on .nm{ color:var(--amber); }
  .proj-opt .ic{ color:var(--text-faint); font-size:11px; }
  .proj-opt .nm{ flex:1; }
  .proj-opt .mini{ display:flex; gap:3px; align-items:center; }
  .proj-opt .mini i{ width:6px; height:6px; border-radius:50%; display:block; }
  .proj-opt .ct{ font-size:10px; color:var(--text-faint); min-width:14px; text-align:right; }

  .filterbar{ display:flex; gap:4px; padding:9px 11px; border-bottom:1px solid var(--line-soft); }
  .chip{
    flex:1; cursor:pointer; user-select:none;
    font-family:var(--label); font-size:8px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-dim); text-align:center;
    padding:5px 4px; border:1px solid var(--line); border-radius:var(--r);
    background:var(--panel-2); transition:.16s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .chip .pip{ width:5px; height:5px; border-radius:50%; }
  .chip:hover{ border-color:var(--text-faint); color:var(--text); }
  .chip.on{ background:var(--panel-3); border-color:var(--amber-deep); color:var(--text); }

  .tree{ flex:1; overflow-y:auto; padding:6px 0 30px; }

  .repo{ margin-top:2px; }
  .repo-head{
    display:flex; align-items:center; gap:8px;
    padding:9px 13px 8px; cursor:pointer; user-select:none;
    background:var(--panel-2); border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft);
    transition:background .14s;
  }
  .repo:first-child .repo-head{ border-top:none; }
  .repo-head:hover{ background:var(--panel-3); }
  .repo-head .chev{ color:var(--text-faint); font-size:9px; width:9px; transition:transform .18s; transform:rotate(90deg); }
  .repo-head.collapsed .chev{ transform:rotate(0deg); }
  .repo-head .ic{ color:var(--amber); font-size:11px; opacity:.8; }
  .repo-head .n{ font-family:var(--mono); font-size:11px; letter-spacing:.02em; color:var(--text); font-weight:500; }
  .repo-head .pips{ display:flex; gap:4px; align-items:center; margin-left:6px; }
  .repo-head .pips i{ width:6px; height:6px; border-radius:50%; display:block; }
  .repo-head .ln{ flex:1; }
  .repo-head .cnt{
    font-family:var(--mono); font-size:9.5px; color:var(--text-faint);
    background:var(--panel-3); border:1px solid var(--line); border-radius:9px;
    padding:1px 7px; min-width:18px; text-align:center;
  }
  .repo-agents{ overflow:hidden; }
  .repo-agents.hidden{ display:none; }

  .agent{
    --c:var(--idle);
    position:relative; cursor:pointer;
    padding:9px 13px 9px 26px;
    border-left:2px solid transparent;
    transition:background .14s, border-color .14s;
    opacity:0; transform:translateX(-6px);
    animation:slideIn .4s forwards;
  }
  @keyframes slideIn{ to{ opacity:1; transform:none; } }
  .agent:hover{ background:var(--panel-2); }
  .agent.sel{ background:var(--panel-3); border-left-color:var(--c); }
  .agent.sel::after{
    content:""; position:absolute; right:0; top:0; bottom:0; width:1px;
    background:linear-gradient(180deg,transparent,var(--c),transparent); opacity:.5;
  }

  .agent .state-dot{
    position:absolute; left:13px; top:13px;
    width:7px; height:7px; border-radius:50%;
    background:var(--c); box-shadow:0 0 0 0 var(--c);
  }
  .agent[data-state="active"] .state-dot{ animation:pulse 1.6s infinite; }
  .agent[data-state="waiting"] .state-dot{ animation:pulseUrgent 1.1s infinite; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(62,224,137,.5); }
    70%{ box-shadow:0 0 0 6px rgba(62,224,137,0); }
    100%{ box-shadow:0 0 0 0 rgba(62,224,137,0); }
  }
  @keyframes pulseUrgent{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,177,61,.55); transform:scale(1); }
    50%{ box-shadow:0 0 0 5px rgba(255,177,61,0); transform:scale(1.25); }
  }

  .agent .row1{ display:flex; align-items:baseline; gap:8px; }
  .agent .aname{ font-weight:500; font-size:12.5px; color:var(--text); letter-spacing:.01em; }
  .agent .model{ font-size:9px; color:var(--text-faint); font-family:var(--label); letter-spacing:.08em; margin-left:auto; }
  .agent .branch{
    font-size:10.5px; color:var(--text-dim); margin-top:2px;
    display:flex; align-items:center; gap:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .agent .branch .gic{ color:var(--text-faint); }
  .agent .task{
    font-size:10.5px; color:var(--text-faint); margin-top:5px;
    display:flex; align-items:center; gap:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .agent .badge{
    font-family:var(--label); font-size:7.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--c); border:1px solid color-mix(in srgb, var(--c) 35%, transparent);
    background:color-mix(in srgb, var(--c) 9%, transparent);
    padding:1.5px 5px; border-radius:2px; flex-shrink:0;
  }
  .agent .diffstat{ font-size:9.5px; margin-top:6px; display:flex; gap:8px; font-family:var(--mono); }
  .agent .diffstat .a{ color:var(--add); }
  .agent .diffstat .d{ color:var(--del); }
  .agent .elapsed{ margin-left:auto; color:var(--text-faint); font-size:9.5px; }

  .agent[data-state="active"]{ --c:var(--active); }
  .agent[data-state="waiting"]{ --c:var(--waiting); }
  .agent[data-state="complete"]{ --c:var(--complete); }
  .agent[data-state="error"]{ --c:var(--error); }
  .agent[data-state="idle"]{ --c:var(--idle); }

  /* ============ MAIN ============ */
  .main{ display:grid; grid-template-rows:1fr 280px; min-width:0; min-height:0; background:var(--bg); }
  .stage{ display:flex; flex-direction:column; min-height:0; border-bottom:1px solid var(--edge); }

  .stage-head{
    display:flex; align-items:center; gap:14px;
    padding:11px 16px; border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, var(--panel), var(--bg));
  }
  .agent-id{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .agent-id .top{ display:flex; align-items:center; gap:10px; }
  .agent-id h1{ font-size:15px; font-weight:600; letter-spacing:.01em; color:var(--text); }
  .agent-id .meta{ font-size:10.5px; color:var(--text-dim); display:flex; align-items:center; gap:9px; }
  .agent-id .meta b{ color:var(--text); font-weight:500; }
  .agent-id .meta .sep{ color:var(--text-faint); }

  .statebadge{
    --c:var(--idle);
    display:inline-flex; align-items:center; gap:7px;
    font-family:var(--label); font-size:9px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--c);
    border:1px solid color-mix(in srgb, var(--c) 40%, transparent);
    background:color-mix(in srgb, var(--c) 10%, transparent);
    padding:5px 11px; border-radius:var(--r);
  }
  .statebadge .dot{ width:7px; height:7px; border-radius:50%; background:var(--c); box-shadow:0 0 8px var(--c); }
  .statebadge[data-state="active"]{ --c:var(--active); }
  .statebadge[data-state="waiting"]{ --c:var(--waiting); }
  .statebadge[data-state="complete"]{ --c:var(--complete); }
  .statebadge[data-state="error"]{ --c:var(--error); }

  .stage-tools{ margin-left:auto; display:flex; gap:6px; }
  .tool{
    font-family:var(--label); font-size:8.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--text-dim); cursor:pointer; user-select:none;
    border:1px solid var(--line); background:var(--panel-2);
    padding:6px 11px; border-radius:var(--r); transition:.15s;
    display:flex; align-items:center; gap:6px;
  }
  .tool:hover{ border-color:var(--text-faint); color:var(--text); background:var(--panel-3); }
  .tool.primary{ color:#0a0c0d; background:var(--amber); border-color:var(--amber); font-weight:600; }
  .tool.primary:hover{ background:#ffc163; }

  /* tabs + files rail */
  .stage-sub{ display:flex; align-items:center; gap:0; padding:0 16px; border-bottom:1px solid var(--line-soft); background:var(--panel); }
  .tab{
    font-family:var(--label); font-size:9px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--text-dim); padding:9px 14px; cursor:pointer; position:relative; transition:.15s;
  }
  .tab:hover{ color:var(--text); }
  .tab.on{ color:var(--amber); }
  .tab.on::after{ content:""; position:absolute; left:14px; right:14px; bottom:-1px; height:2px; background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .filecount{ margin-left:auto; font-size:9.5px; color:var(--text-faint); }

  .stage-body{ flex:1; overflow:auto; min-height:0; }

  /* diff */
  .diff{ padding:0 0 40px; }
  .file{ border-bottom:1px solid var(--line-soft); }
  .file-head{
    position:sticky; top:0; z-index:2;
    display:flex; align-items:center; gap:10px;
    padding:9px 16px; background:var(--panel-2);
    border-bottom:1px solid var(--line-soft);
    font-size:11.5px; color:var(--text);
  }
  .file-head .fic{ color:var(--amber); }
  .file-head .path{ color:var(--text-dim); }
  .file-head .path b{ color:var(--text); font-weight:500; }
  .file-head .fstat{ margin-left:auto; display:flex; gap:9px; font-size:10px; }
  .file-head .fstat .a{ color:var(--add); }
  .file-head .fstat .d{ color:var(--del); }

  .hunk{ font-size:12px; line-height:1.7; }
  .ln{ display:flex; white-space:pre; }
  .ln .gut{
    flex-shrink:0; width:88px; text-align:right; padding-right:14px;
    color:var(--text-faint); font-size:10.5px; user-select:none;
    border-right:1px solid var(--line-soft); background:rgba(255,255,255,.008);
  }
  .ln .gut span{ display:inline-block; width:34px; }
  .ln .code{ padding-left:14px; flex:1; color:var(--text-dim); }
  .ln.add{ background:var(--add-bg); }
  .ln.add .code{ color:#bff5d6; }
  .ln.add .code::before{ content:"+ "; color:var(--add); }
  .ln.del{ background:var(--del-bg); }
  .ln.del .code{ color:#ffc7c2; }
  .ln.del .code::before{ content:"- "; color:var(--del); }
  .ln.ctx .code::before{ content:"  "; }
  .ln.meta{ background:rgba(86,199,255,.05); }
  .ln.meta .code{ color:var(--complete); font-style:italic; }
  .ln.meta .code::before{ content:"@ "; }

  .empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; color:var(--text-faint); }
  .empty .big{ font-family:var(--label); font-size:11px; letter-spacing:.3em; text-transform:uppercase; }
  .empty .sub{ font-size:11px; max-width:340px; text-align:center; line-height:1.7; }

  /* ============ TERMINAL DOCK ============ */
  .dock{ display:flex; flex-direction:column; min-height:0; background:var(--bg); }
  .dock-head{
    display:flex; align-items:center; gap:10px;
    padding:8px 16px; border-bottom:1px solid var(--line-soft);
    background:var(--panel);
  }
  .dock-head .lbl{ font-family:var(--label); font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .dock-head .lbl .gd{ width:6px; height:6px; border-radius:50%; background:var(--active); box-shadow:0 0 7px var(--active); }
  .dock-head .ctx{ font-size:10px; color:var(--text-faint); }
  .dock-head .tabs{ margin-left:auto; display:flex; gap:3px; }
  .dtab{ font-family:var(--label); font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); padding:4px 9px; border-radius:2px; cursor:pointer; }
  .dtab.on{ background:var(--panel-3); color:var(--text); }

  .term{ flex:1; overflow-y:auto; padding:12px 16px; font-size:12px; line-height:1.65; min-height:0; }
  .term .l{ white-space:pre-wrap; word-break:break-word; }
  .term .pl{ color:var(--text-faint); }   /* prompt label */
  .term .cmd{ color:var(--text); }
  .term .ok{ color:var(--active); }
  .term .warn{ color:var(--waiting); }
  .term .err{ color:var(--error); }
  .term .info{ color:var(--complete); }
  .term .dim{ color:var(--text-faint); }
  .term .agentline{ color:#cdd6d9; }
  .term .agentline::before{ content:"◆ "; color:var(--amber); }
  .cursor{ display:inline-block; width:8px; height:14px; background:var(--amber); vertical-align:-2px; animation:blink 1.05s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  /* interaction bar — the centerpiece */
  .interact{
    border-top:1px solid var(--edge);
    background:var(--panel);
    padding:10px 14px 12px;
  }
  .prompt-state{
    display:flex; align-items:center; gap:9px; margin-bottom:9px;
    font-size:10.5px; color:var(--text-dim);
  }
  .prompt-state .ic{ color:var(--c, var(--amber)); }
  .prompt-state.waiting{ color:var(--waiting); }
  .prompt-state.waiting .q{ color:var(--text); }

  .quickrow{ display:flex; gap:6px; margin-bottom:9px; flex-wrap:wrap; }
  .qa{
    font-family:var(--label); font-size:8.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-dim); cursor:pointer; user-select:none;
    border:1px solid var(--line); background:var(--panel-2);
    padding:6px 11px; border-radius:var(--r); transition:.15s;
    display:flex; align-items:center; gap:6px;
  }
  .qa:hover{ border-color:var(--text-faint); color:var(--text); }
  .qa.go{ border-color:color-mix(in srgb,var(--active) 45%,transparent); color:var(--active); }
  .qa.go:hover{ background:color-mix(in srgb,var(--active) 12%,transparent); }
  .qa.warn{ border-color:color-mix(in srgb,var(--waiting) 45%,transparent); color:var(--waiting); }
  .qa.warn:hover{ background:color-mix(in srgb,var(--waiting) 12%,transparent); }
  .qa.stop{ border-color:color-mix(in srgb,var(--error) 45%,transparent); color:var(--error); }
  .qa.stop:hover{ background:color-mix(in srgb,var(--error) 12%,transparent); }

  .composer{
    display:flex; align-items:flex-end; gap:10px;
    border:1px solid var(--line); border-radius:var(--r);
    background:var(--panel-2); padding:9px 10px 9px 13px;
    transition:border-color .18s, box-shadow .18s;
  }
  .composer.hot{ border-color:var(--amber); box-shadow:0 0 0 1px rgba(255,177,61,.2), 0 0 22px -6px rgba(255,177,61,.4); }
  .composer .caret{ color:var(--amber); font-weight:600; padding-bottom:1px; }
  .composer textarea{
    flex:1; resize:none; border:none; outline:none; background:transparent;
    color:var(--text); font-family:var(--mono); font-size:12.5px; line-height:1.5;
    max-height:96px; min-height:20px;
  }
  .composer textarea::placeholder{ color:var(--text-faint); }
  .composer .send{
    flex-shrink:0; cursor:pointer; user-select:none;
    font-family:var(--label); font-size:9px; letter-spacing:.14em; text-transform:uppercase;
    color:#0a0c0d; background:var(--amber); font-weight:600;
    padding:7px 13px; border-radius:2px; transition:.15s;
    display:flex; align-items:center; gap:7px;
  }
  .composer .send:hover{ background:#ffc163; }
  .composer .send .kbd{ font-size:8px; opacity:.6; font-weight:400; }

  /* ============ STATUSBAR ============ */
  .statusbar{
    display:flex; align-items:center; gap:0;
    background:var(--panel);
    border-top:1px solid var(--edge);
    font-family:var(--label); font-size:8px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--text-faint);
  }
  .statusbar .seg{ padding:0 12px; display:flex; align-items:center; gap:7px; height:22px; border-right:1px solid var(--line-soft); }
  .statusbar .seg.brand{ background:var(--amber); color:#0a0c0d; font-weight:600; }
  .statusbar .grow{ flex:1; }
  .statusbar .seg.r{ border-right:none; border-left:1px solid var(--line-soft); }

  /* scrollbars */
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#1e2629; border-radius:5px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#2a3438; }

  .flash{ animation:flash .5s; }
  @keyframes flash{ 0%{ background:rgba(255,177,61,.18); } 100%{ background:transparent; } }
</style>
</head>
<body>
<div class="app">

  <!-- TITLEBAR -->
  <header class="titlebar">
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="brand"><span class="spark">◆</span>FLEET<small>AGENT OPS CONSOLE</small></div>
    <div class="telemetry">
      <div class="tstat"><span class="pip active"></span><span class="tstat-num" id="t-active">0</span> Active</div>
      <div class="tstat"><span class="pip waiting"></span><span class="tstat-num" id="t-waiting">0</span> Awaiting</div>
      <div class="tstat"><span class="pip error"></span><span class="tstat-num" id="t-error">0</span> Error</div>
      <button class="themebtn" id="themebtn" title="Toggle theme"><span class="ti">☾</span><span class="tl">Dark</span></button>

  <div class="body">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="side-head">
        <h2>Fleet</h2>

        <div class="chip" data-filter="active"><span class="pip" style="background:var(--active)"></span>Run</div>
        <div class="chip" data-filter="waiting"><span class="pip" style="background:var(--waiting)"></span>Wait</div>
        <div class="chip" data-filter="complete"><span class="pip" style="background:var(--complete)"></span>Done</div>
      </div>
      <div class="tree" id="tree"></div>

    <!-- MAIN -->
    <main class="main">
      <section class="stage">
        <div class="stage-head" id="stage-head"></div>
        <div class="stage-sub" id="stage-sub"></div>
        <div class="stage-body" id="stage-body"></div>

      <!-- TERMINAL DOCK -->
      <section class="dock">
        <div class="dock-head">
          <span class="lbl"><span class="gd" id="dock-gd"></span>Terminal</span>
          <span class="ctx" id="dock-ctx">—</span>
          <div class="tabs">
            <div class="dtab on">Output</div>
            <div class="dtab">Plan</div>

        <div class="term" id="term"></div>

  <!-- STATUSBAR -->

    <div class="seg brand">◆ FLEET</div>

    <div class="seg" id="sb-branch">—</div>
    <div class="grow"></div>
    <div class="seg r">opus-4.8</div>
    <div class="seg r" id="sb-net">live</div>
    <div class="seg r">UTF-8</div>
  </footer>
</div>

<script>
/* ============ DATA ============ */
const STATES = {
  active:   { label:'Active',   verb:'working' },
  waiting:  { label:'Awaiting input', verb:'paused' },
  complete: { label:'Complete', verb:'done' },

const AGENTS = [
  {
    id:'a1', name:'streamer', model:'opus-4.8', repo:'atlas-api',

    task:'Wiring SSE transport into /v1/messages', elapsed:'8m12s', add:214, del:37,
    files:[
      { path:'src/routes/messages.ts', add:64, del:12, lines:[

      { path:'src/lib/sse.ts', add:48, del:0, lines:[
        ['meta','@@ -0,0 +1,9 @@'],

    term:[

      ['dim','  → 218 lines, 2 handlers'],
      ['agentline','Adding event-stream branch to handler'],
      ['ok','✓ edited src/routes/messages.ts (+11 -1)'],
      ['agentline','Creating src/lib/sse.ts'],
      ['ok','✓ wrote src/lib/sse.ts (+9)'],
      ['agentline','Running test suite'],
      ['dim','  npm test -- messages'],
      ['info','  PASS  test/messages.spec.ts (4 passed)'],
      ['agentline','Checking heartbeat interval against gateway timeout…'],
    ],
  },
  {
    id:'a2', name:'refresher', model:'sonnet-4.6', repo:'atlas-api',
    worktree:'../wt/fix-auth', branch:'fix/auth-refresh-race', state:'waiting',
    task:'Needs a decision on token rotation strategy', elapsed:'2m40s', add:31, del:18,
    question:'Rotate refresh tokens on every use, or only near expiry? Rotation-on-use is safer but invalidates concurrent tabs.',
    files:[
      { path:'src/auth/refresh.ts', add:31, del:18, lines:[
        ['meta','@@ -22,10 +22,14 @@ async function refresh(token)'],
        ['del','  const next = await mint(user)'],
        ['del','  return next'],
        ['add','  // TODO(decision): rotation policy — see question'],
        ['add','  const reuse = await detectReuse(token)'],

      ]},
    ],
    term:[
      ['agentline','Analyzing refresh-token race condition'],
      ['dim','  found 2 concurrent-refresh paths'],
      ['agentline','Drafted reuse-detection guard'],
      ['ok','✓ edited src/auth/refresh.ts (+8 -2)'],
      ['warn','⚠ Decision required before continuing.'],
      ['warn','  Token rotation strategy affects multi-tab sessions.'],
    ],
  },
  {
    id:'a3', name:'cockpit-ui', model:'opus-4.8', repo:'atlas-web',
    worktree:'../wt/feat-cockpit', branch:'feat/agent-cockpit', state:'complete',
    task:'Built agent tree + diff panel', elapsed:'done · 19m', add:512, del:88,
    files:[
      { path:'src/views/Tree.tsx', add:180, del:20, lines:[
        ['meta','@@ -1,4 +1,12 @@'],
        ['add','export function Tree({ agents }: { agents: Agent[] }) {'],
        ['add','  const byRepo = groupBy(agents, a => a.repo)'],
        ['add','  return <nav>{Object.entries(byRepo).map(renderRepo)}</nav>'],
        ['add','}'],
        ['ctx',''],
        ['ctx','// state-driven dot colors'],
      ]},
      { path:'src/views/Diff.tsx', add:240, del:48, lines:[
        ['meta','@@ -10,6 +10,20 @@'],
        ['add','const hunkColor = { add:"--add", del:"--del", ctx:"--dim" }'],
      ]},
    ],
    term:[
      ['agentline','Implementing Tree + Diff components'],
      ['ok','✓ wrote src/views/Tree.tsx (+180 -20)'],
      ['ok','✓ wrote src/views/Diff.tsx (+240 -48)'],
      ['agentline','Running typecheck + tests'],
      ['info','  PASS  18 files, 0 errors'],
      ['ok','✓ Task complete. 5 files changed, +512 -88.'],
      ['dim','  Branch ready: feat/agent-cockpit'],
    ],
  },
  {
    id:'a4', name:'webgl-spike', model:'sonnet-4.6', repo:'atlas-web',
    worktree:'../wt/spike-webgl', branch:'spike/webgl-carousel', state:'error',
    task:'Build failed — missing texture binding', elapsed:'fail · 4m', add:96, del:4,
    files:[
      { path:'src/gl/carousel.ts', add:96, del:4, lines:[
        ['meta','@@ -55,3 +55,7 @@'],
        ['add','gl.bindTexture(gl.TEXTURE_2D, tex)  // <- tex undefined'],
      ]},
    ],
    term:[
      ['agentline','Prototyping WebGL carousel of terminals'],
      ['ok','✓ wrote src/gl/carousel.ts (+96 -4)'],
      ['agentline','Building'],
      ['err','✗ TypeError: tex is undefined at carousel.ts:57'],
      ['err','  Texture never initialized before bindTexture.'],
      ['dim','  Build aborted. Awaiting instructions.'],
    ],
  },
  {
    id:'a5', name:'deps-bot', model:'haiku-4.5', repo:'infra',
    worktree:'../wt/chore-deps', branch:'chore/bump-deps', state:'idle',
    task:'Queued — bump 6 minor versions', elapsed:'queued', add:0, del:0,
    files:[],
    term:[
      ['dim','Agent idle. No active task.'],
      ['dim','Queued: bump 6 minor dependency versions.'],
    ],
  },
];

/* ============ STATE ============ */
let selectedId = 'a1';
let filter = 'all';
let projectFilter = 'all';
const collapsed = new Set();
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const get = id => AGENTS.find(a=>a.id===id);

/* ============ RENDER: SIDEBAR ============ */
const ALL_REPOS = ()=>[...new Set(AGENTS.map(a=>a.repo))];

function statePips(list){
  return list.map(a=>`<i style="background:var(--${a.state})" title="${a.name}: ${STATES[a.state].label}"></i>`).join('');
}

function renderProjectMenu(){
  const repos = ALL_REPOS();
  const opt = (val,label,list)=>`
    <div class="proj-opt ${projectFilter===val?'on':''}" data-proj="${val}">
      <span class="ic">${val==='all'?'◈':'▣'}</span>
      <span class="nm">${label}</span>
      <span class="mini">${statePips(list)}</span>
      <span class="ct">${list.length}</span>
    </div>`;
  $('#projmenu').innerHTML =
    opt('all','All projects',AGENTS) +
    repos.map(r=>opt(r,r,AGENTS.filter(a=>a.repo===r))).join('');
  $('#projval').textContent = projectFilter==='all' ? 'All projects' : projectFilter;
  $$('.proj-opt').forEach(o=>o.onclick=()=>{
    projectFilter=o.dataset.proj; $('#projsel').classList.remove('open');
    renderProjectMenu(); renderTree();
  });
}

function renderTree(){
  const tree = $('#tree');
  const repos = ALL_REPOS().filter(r=> projectFilter==='all' || r===projectFilter);
  const visible = AGENTS.filter(a => filter==='all' || a.state===filter);
  tree.innerHTML = '';
  let idx = 0;
  repos.forEach(repo=>{
    const all = AGENTS.filter(a=>a.repo===repo);
    const group = visible.filter(a=>a.repo===repo);
    if(!group.length) return;
    const isCollapsed = collapsed.has(repo);

    const wrap = document.createElement('div');
    wrap.className='repo';
    const head = document.createElement('div');
    head.className='repo-head'+(isCollapsed?' collapsed':'');
    head.innerHTML = `
      <span class="chev">▶</span>
      <span class="ic">▣</span>
      <span class="n">${repo}</span>
      <span class="pips">${statePips(all)}</span>
      <span class="ln"></span>
      <span class="cnt">${group.length}</span>`;
    head.onclick=()=>{ collapsed.has(repo)?collapsed.delete(repo):collapsed.add(repo); renderTree(); };
    wrap.appendChild(head);

    const box = document.createElement('div');
    box.className='repo-agents'+(isCollapsed?' hidden':'');
    group.forEach(a=>{
      const el = document.createElement('div');
      el.className='agent'+(a.id===selectedId?' sel':'');
      el.dataset.state=a.state; el.dataset.id=a.id;
      el.style.animationDelay=(idx++*40)+'ms';
      const stat = (a.add||a.del) ? `<div class="diffstat"><span class="a">+${a.add}</span><span class="d">−${a.del}</span></div>` : '';
      el.innerHTML = `
        <span class="state-dot"></span>
        <div class="row1"><span class="aname">${a.name}</span><span class="elapsed">${a.elapsed}</span></div>
        <div class="branch"><span class="gic">⌥</span>${a.branch}</div>
        <div class="task">${a.task}</div>
        ${stat}`;
      el.onclick=()=>select(a.id);
      box.appendChild(el);
    });
    wrap.appendChild(box);
    tree.appendChild(wrap);
  });
  const shownRepos = repos.length;
  $('#fleet-count').textContent = `${AGENTS.length} agents · ${ALL_REPOS().length} repos`;
}

/* ============ RENDER: STAGE ============ */
function renderStage(){
  const a = get(selectedId);
  if(!a){ return; }
  $('#stage-head').innerHTML = `
    <div class="agent-id">
      <div class="top">
        <h1>${a.name}</h1>
        <span class="statebadge" data-state="${a.state}"><span class="dot"></span>${STATES[a.state].label}</span>
      </div>
      <div class="meta"><b>${a.repo}</b><span class="sep">/</span>${a.worktree}<span class="sep">·</span>⌥ <b>${a.branch}</b><span class="sep">·</span>${a.model}</div>
    </div>
    <div class="stage-tools">
      <div class="tool" onclick="event.stopPropagation()">⌥ Worktree</div>
      <div class="tool">⧉ Open in editor</div>
      <div class="tool primary">⇲ Create PR</div>
    </div>`;

  const fileCount = a.files.length;
  $('#stage-sub').innerHTML = `
    <div class="tab on">Diff</div>
    <div class="tab">Changed files</div>
    <div class="tab">Session</div>
    <div class="filecount">${fileCount} file${fileCount!==1?'s':''} · <span style="color:var(--add)">+${a.add}</span> <span style="color:var(--del)">−${a.del}</span></div>`;

  const body = $('#stage-body');
  if(!a.files.length){
    body.innerHTML = `<div class="empty"><div class="big">No changes yet</div><div class="sub">This agent hasn't modified any files. Send it a task from the console below to put it to work.</div></div>`;
  } else {
    body.innerHTML = `<div class="diff">${a.files.map(renderFile).join('')}</div>`;
  }

  // statusbar
  $('#sb-sel').textContent = a.name;
  $('#sb-branch').textContent = '⌥ '+a.branch;
}

function renderFile(f){
  let oldN=parseInt((f.lines.find(l=>l[0]==='meta')||['','@@ -1'])[1].match(/-(\d+)/)?.[1]||1);
  let newN=parseInt((f.lines.find(l=>l[0]==='meta')||['','@@ -1 +1'])[1].match(/\+(\d+)/)?.[1]||1);
  const rows = f.lines.map(([t,code])=>{
    if(t==='meta'){ const m=code.match(/-(\d+).*\+(\d+)/); if(m){oldN=+m[1];newN=+m[2];} return `<div class="ln meta"><div class="gut"><span></span><span></span></div><div class="code">${esc(code)}</div></div>`; }
    let o='',n='';
    if(t==='del'){ o=oldN++; }
    else if(t==='add'){ n=newN++; }
    else { o=oldN++; n=newN++; }
    return `<div class="ln ${t}"><div class="gut"><span>${o}</span><span>${n}</span></div><div class="code">${esc(code)}</div></div>`;
  }).join('');
  return `<div class="file">
    <div class="file-head"><span class="fic">≡</span><span class="path"><b>${f.path}</b></span><span class="fstat"><span class="a">+${f.add}</span><span class="d">−${f.del}</span></span></div>
    <div class="hunk">${rows}</div>
  </div>`;
}

/* ============ RENDER: TERMINAL + INTERACTION ============ */
function renderTerm(){
  const a = get(selectedId);
  const term = $('#term');
  term.innerHTML = a.term.map(([c,t])=>`<div class="l ${c}">${esc(t)}</div>`).join('') +
    (a.state==='active' ? `<div class="l"><span class="cursor"></span></div>` : '');
  term.scrollTop = term.scrollHeight;
  $('#dock-ctx').textContent = `${a.repo} · ${a.branch}`;
  $('#dock-gd').style.background = `var(--${a.state})`;
  $('#dock-gd').style.boxShadow = `0 0 7px var(--${a.state})`;
  renderInteract();
}

function renderInteract(){
  const a = get(selectedId);
  const box = $('#interact');
  let stateLine, quick, placeholder, hot='';

  if(a.state==='waiting'){
    hot='hot';
    stateLine = `<div class="prompt-state waiting"><span class="ic">◆</span><span><b style="color:var(--waiting)">Awaiting your input</b> — <span class="q">${esc(a.question||'agent paused for feedback')}</span></span></div>`;
    quick = `
      <div class="qa go" data-act="approve">✓ Approve &amp; continue</div>
      <div class="qa warn" data-act="changes">↺ Request changes</div>
      <div class="qa" data-act="answer">✎ Answer inline</div>`;
    placeholder = 'Type your decision and press ⏎ to continue the session…';
  } else if(a.state==='active'){
    stateLine = `<div class="prompt-state"><span class="ic" style="color:var(--active)">●</span>Agent is working — queue a message or interrupt.</div>`;
    quick = `
      <div class="qa" data-act="queue">⊕ Queue message</div>
      <div class="qa stop" data-act="interrupt">■ Interrupt</div>`;
    placeholder = 'Queue a follow-up instruction…';
  } else if(a.state==='complete'){
    stateLine = `<div class="prompt-state"><span class="ic" style="color:var(--complete)">✓</span>Task complete — send a new task to reopen the session.</div>`;
    quick = `
      <div class="qa go" data-act="newtask">▸ New task</div>
      <div class="qa" data-act="review">⊙ Review &amp; merge</div>
      <div class="qa" data-act="archive">⌗ Archive worktree</div>`;
    placeholder = 'Describe the next task for this agent…';
  } else if(a.state==='error'){
    stateLine = `<div class="prompt-state" style="color:var(--error)"><span class="ic">✗</span>Run failed — send a fix or retry.</div>`;
    quick = `
      <div class="qa go" data-act="retry">↻ Retry</div>
      <div class="qa warn" data-act="fix">⚒ Send fix</div>
      <div class="qa" data-act="log">▤ View full log</div>`;
    placeholder = 'Tell the agent how to recover…';
  } else { // idle
    stateLine = `<div class="prompt-state"><span class="ic" style="color:var(--idle)">○</span>Agent idle — dispatch a task to begin.</div>`;
    quick = `<div class="qa go" data-act="dispatch">▸ Dispatch task</div>`;
    placeholder = 'Give this idle agent something to do…';
  }

  box.innerHTML = `
    ${stateLine}
    <div class="quickrow">${quick}</div>
    <div class="composer ${hot}">
      <span class="caret">›</span>
      <textarea id="composer" rows="1" placeholder="${placeholder}"></textarea>
      <div class="send" id="send">Send <span class="kbd">⏎</span></div>
    </div>`;

  const ta = $('#composer');
  ta.addEventListener('input',()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; });
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); dispatch(ta.value); } });
  $('#send').onclick=()=>dispatch($('#composer').value);
  $$('.qa',box).forEach(q=>q.onclick=()=>quickAct(q.dataset.act));
}

/* ============ INTERACTION LOGIC ============ */
function dispatch(text){
  text=(text||'').trim();
  if(!text) return;
  const a = get(selectedId);
  a.term.push(['pl','› you'],['cmd','  '+text]);
  a.term.push(['agentline','Acknowledged. Resuming session…']);
  a.state='active';
  a.task='Resuming: '+text.slice(0,46)+(text.length>46?'…':'');
  a.elapsed='0m04s';
  refreshAll();
  // simulate the agent picking up work
  setTimeout(()=>{ if(get(selectedId)===a){ a.term.push(['dim','  thinking…']); renderTerm(); } },700);
}

function quickAct(act){
  const a = get(selectedId);
  const msgs = {
    approve:['pl','› approved'], changes:['pl','› requested changes'],
    queue:['pl','› queued'], interrupt:['err','■ interrupt sent — halting agent'],
    newtask:['pl','› new task'], retry:['warn','↻ retrying last run'],
    fix:['pl','› sending fix'], dispatch:['pl','› dispatching'], answer:['pl','› answer'],
    review:['info','⊙ opening review'], archive:['dim','⌗ worktree archived'],
    log:['dim','▤ opening full log'],
  };
  if(act==='interrupt'){ a.term.push(['err','■ interrupt sent — halting agent']); a.state='idle'; a.task='Interrupted by operator.'; refreshAll(); return; }
  if(act==='archive'){ a.term.push(['dim','⌗ worktree archived']); renderTerm(); return; }
  if(act==='answer'||act==='fix'||act==='newtask'||act==='dispatch'||act==='changes'){ $('#composer').focus(); return; }
  // approve / queue / retry → resume
  a.term.push(msgs[act]||['pl','› '+act]);
  a.term.push(['agentline','Resuming session…']);
  a.state='active'; a.elapsed='0m02s';
  if(act==='approve') a.task='Continuing after approval';
  if(act==='retry') a.task='Retrying failed build';
  refreshAll();
}

/* ============ DRIVERS ============ */
function select(id){
  selectedId=id;
  $$('.agent').forEach(e=>e.classList.toggle('sel', e.dataset.id===id));
  renderStage(); renderTerm();
}
function refreshAll(){ renderProjectMenu(); renderTree(); renderStage(); renderTerm(); updateTelemetry(); }
function updateTelemetry(){
  const c=s=>AGENTS.filter(a=>a.state===s).length;
  $('#t-active').textContent=c('active');
  $('#t-waiting').textContent=c('waiting');
  $('#t-error').textContent=c('error');
}
function esc(s){ return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

/* filters */
$$('.chip').forEach(c=>c.onclick=()=>{
  $$('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on');
  filter=c.dataset.filter; renderTree();
});

/* project dropdown */
$('#projbtn').onclick=e=>{ e.stopPropagation(); $('#projsel').classList.toggle('open'); };
document.addEventListener('click',e=>{ if(!$('#projsel').contains(e.target)) $('#projsel').classList.remove('open'); });

/* theme toggle */
let theme='dark';
$('#themebtn').onclick=()=>{
  theme = theme==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const b=$('#themebtn');
  $('.ti',b).textContent = theme==='dark' ? '☾' : '☀';
  $('.tl',b).textContent = theme==='dark' ? 'Dark' : 'Light';
};
document.documentElement.setAttribute('data-theme','dark');

/* clock */
function tick(){
  const d=new Date();
  $('#clock').textContent=d.toTimeString().slice(0,8);
}
setInterval(tick,1000); tick();

/* live sim: stream into active agents + occasional transition */
const LIVE = [
  ['agentline','Re-checking heartbeat against 30s gateway timeout'],
  ['ok','✓ added keepalive comment frames'],
  ['agentline','Updating integration test for stream mode'],
  ['info','  PASS  test/stream.spec.ts (3 passed)'],
  ['agentline','Formatting with prettier'],
  ['ok','✓ no changes after format'],
];
let liveI=0;
setInterval(()=>{
  const a=AGENTS.find(x=>x.state==='active');
  if(!a) return;
  a.term.push(LIVE[liveI%LIVE.length]); liveI++;
  if(a.term.length>40) a.term.splice(0,a.term.length-40);
  if(a.id===selectedId) renderTerm();
  // bump elapsed loosely
}, 3200);

/* init */
renderProjectMenu(); renderTree(); renderStage(); renderTerm(); updateTelemetry();
</script>
