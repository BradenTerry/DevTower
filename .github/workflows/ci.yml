name: CI

# Typechecks, tests, and builds on every pull request targeting main. Merges to main are not
# re-tested here -- the PR already ran this gate, and the release workflow re-runs it on the
# tagged commit before publishing, so that step is the actual release gate.
#
# The job fans out across the three OSes the extension ships to. The tests exercise the
# OS-sensitive logic (git plumbing, transcript scanning, path handling), so the matrix is the
# point: a Windows-only path-separator or line-ending regression fails here, not in the wild.
on:
  pull_request:
    branches: [main]

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + test + build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (production bundle)
        run: npm run build
