name: CI

# Typechecks and builds on every pull request targeting main. Merges to main are not
# re-tested here -- the PR already ran this gate, and the release workflow re-runs it on the
# tagged commit before publishing, so that step is the actual release gate.
on:
  pull_request:
    branches: [main]

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (production bundle)
        run: npm run build
