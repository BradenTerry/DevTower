name: Release

# Runs when you push a version tag (e.g. v0.2.0) to a commit on main. The tag is the
# single source of truth for the version: it is injected into package.json at build
# time (the committed "version" is just a placeholder and is never edited by hand).
# The job typechecks, builds, packages the extension as a .vsix, creates a GitHub release
# with auto-generated notes and the .vsix attached, and publishes to the VS Code
# Marketplace when VSCE_PAT is set.
#
# Release channel is chosen by a "-" suffix on the tag:
#   plain  vX.Y.Z        (v1.0.0)      -> regular release channel
#   suffix vX.Y.Z-<tag>  (v1.0.1-pre)  -> pre-release channel (--pre-release)
# The Marketplace version can't contain "-", so the suffix is stripped before
# publishing; it only flips the channel and names the git tag/GitHub release.
# Publishing a pre-release is what makes the "Switch to Pre-Release Version"
# button appear on the listing.
#
#   git tag v0.2.0     && git push origin v0.2.0       # regular release  -> publishes 0.2.0
#   git tag v0.2.1-pre && git push origin v0.2.1-pre   # pre-release      -> publishes 0.2.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Determine version and release channel from tag
        id: channel
        run: |
          raw="${GITHUB_REF_NAME#v}"      # e.g. 1.0.1-pre  or  1.0.1
          version="${raw%%-*}"            # strip any -suffix -> 1.0.1 (Marketplace forbids "-")
          if [ "$raw" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME has a -suffix -> pre-release channel (publishing $version)"
            echo "pre_release_flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $GITHUB_REF_NAME is plain -> regular channel (publishing $version)"
            echo "pre_release_flag=" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: npm version "${{ steps.channel.outputs.version }}" --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (production bundle)
        run: npm run build

      - name: Package extension
        run: npx --yes @vscode/vsce package ${{ steps.channel.outputs.pre_release_flag }} --readme-path MARKETPLACE.md --out DevTower.vsix

      - name: Create GitHub release with .vsix
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ steps.channel.outputs.pre_release_flag }}
        run: |
          gh release create "$GITHUB_REF_NAME" DevTower.vsix \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            ${PRERELEASE_FLAG:+--prerelease}

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish ${{ steps.channel.outputs.pre_release_flag }} --packagePath DevTower.vsix -p "$VSCE_PAT"
