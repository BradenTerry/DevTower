name: Release

# Runs when you push a version tag (e.g. v0.2.0) to a commit on main. The tag is the
# single source of truth for the version: it is injected into package.json at build
# time (the committed "version" is just a placeholder and is never edited by hand).
# The job typechecks, builds, packages the extension as a pre-release .vsix, creates a
# GitHub pre-release with auto-generated notes and the .vsix attached, and publishes to
# the VS Code Marketplace pre-release channel when VSCE_PAT is set.
#
# DevTower ships on the Marketplace *pre-release* (preview) channel for now, so both the
# package and publish steps pass --pre-release.
#
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (production bundle)
        run: npm run build

      - name: Package extension (pre-release)
        run: npx --yes @vscode/vsce package --pre-release --readme-path MARKETPLACE.md --out devtower.vsix

      - name: Create GitHub pre-release with .vsix
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" devtower.vsix --title "$GITHUB_REF_NAME" --generate-notes --prerelease

      - name: Publish to VS Code Marketplace (pre-release)
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --pre-release --packagePath devtower.vsix -p "$VSCE_PAT"
