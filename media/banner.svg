<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10171b"/>
      <stop offset="1" stop-color="#070a0c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <!-- subtle floor grid -->
  <g stroke="#1c252b" stroke-width="1">
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
  </g>
  <!-- the app icon, so the banner and the Marketplace icon share one mark -->
  <image href="icon.png" xlink:href="icon.png" x="84" y="52" width="256" height="256"/>
  <text x="392" y="170" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="76" font-weight="700" fill="#eef3f5">DevTower</text>
  <text x="394" y="220" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="26" fill="#a2adb1">A pixel office tower for your coding agents</text>
  <text x="394" y="262" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="19" fill="#ffb13d">spawn devs into worktrees . review diffs and PRs</text>
</svg>
